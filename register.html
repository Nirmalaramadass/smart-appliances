<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartFix Pro - Register</title>
    <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
    <meta name="description" content="Create your SmartFix Pro account. Sign up to track repairs, manage appliances, and access exclusive features.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            blue: '#2563eb',
                            cyan: '#06b6d4',
                            green: '#16a34a',
                            orange: '#f97316',
                            slate: '#0f172a',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <!-- Navbar will be injected by navbar.js -->
    
    <!-- Register Section -->
    <section class="pt-32 pb-20 flex items-center justify-center min-h-screen">
        <div class="max-w-lg w-full px-4 sm:px-6 lg:px-8">
            <div class="glass-card p-8">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 bg-gradient-to-br from-blue-600 to-cyan-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-bold">Create Your Account</h2>
                    <p class="text-gray-600 dark:text-gray-400 mt-2">Join SmartFix Pro for exclusive benefits</p>
                </div>

                <form id="register-form" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Full Name *</label>
                        <div class="relative">
                            <input type="text" id="full-name" required class="form-input pl-12" placeholder="John Doe">
                            <svg class="w-5 h-5 text-gray-400 absolute left-4 top-1/2 transform -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Email Address *</label>
                        <div class="relative">
                            <input type="email" id="email" required class="form-input pl-12" placeholder="you@example.com">
                            <svg class="w-5 h-5 text-gray-400 absolute left-4 top-1/2 transform -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"></path>
                            </svg>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Phone Number *</label>
                        <div class="relative">
                            <input type="tel" id="phone" required class="form-input pl-12" placeholder="(555) 123-4567">
                            <svg class="w-5 h-5 text-gray-400 absolute left-4 top-1/2 transform -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                            </svg>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Address *</label>
                        <div class="relative">
                            <input type="text" id="address" required class="form-input pl-12" placeholder="123 Main Street, City, State ZIP">
                            <svg class="w-5 h-5 text-gray-400 absolute left-4 top-1/2 transform -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            </svg>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Password *</label>
                        <div class="relative">
                            <input type="password" id="password" required class="form-input pl-12 pr-12" placeholder="••••••••">
                            <svg class="w-5 h-5 text-gray-400 absolute left-4 top-1/2 transform -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                            <button type="button" id="toggle-password" class="absolute right-4 top-1/2 transform -translate-y-1/2">
                                <svg class="w-5 h-5 text-gray-400 hover:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                </svg>
                            </button>
                        </div>
                        
                        <!-- Password Strength Indicator -->
                        <div class="mt-3">
                            <div class="flex space-x-1 mb-2">
                                <div id="strength-1" class="h-1 flex-1 bg-gray-200 dark:bg-gray-700 rounded"></div>
                                <div id="strength-2" class="h-1 flex-1 bg-gray-200 dark:bg-gray-700 rounded"></div>
                                <div id="strength-3" class="h-1 flex-1 bg-gray-200 dark:bg-gray-700 rounded"></div>
                                <div id="strength-4" class="h-1 flex-1 bg-gray-200 dark:bg-gray-700 rounded"></div>
                            </div>
                            <p id="strength-text" class="text-sm text-gray-500">Password strength</p>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Confirm Password *</label>
                        <div class="relative">
                            <input type="password" id="confirm-password" required class="form-input pl-12 pr-12" placeholder="••••••••">
                            <svg class="w-5 h-5 text-gray-400 absolute left-4 top-1/2 transform -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            <button type="button" id="toggle-confirm-password" class="absolute right-4 top-1/2 transform -translate-y-1/2">
                                <svg class="w-5 h-5 text-gray-400 hover:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                </svg>
                            </button>
                        </div>
                        <p id="password-match" class="text-sm text-gray-500 mt-2"></p>
                    </div>

                    <div class="flex items-start">
                        <input type="checkbox" id="terms" required class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500 mt-1">
                        <label for="terms" class="ml-2 text-sm text-gray-600 dark:text-gray-400">
                            I agree to the <a href="#" class="text-blue-600 dark:text-blue-400 hover:underline">Terms of Service</a> and <a href="#" class="text-blue-600 dark:text-blue-400 hover:underline">Privacy Policy</a>
                        </label>
                    </div>

                    <button type="submit" class="w-full px-6 py-4 bg-gradient-to-r from-blue-600 to-cyan-500 text-white rounded-xl font-semibold text-lg hover:shadow-2xl hover:scale-105 transition-all duration-300">
                        Create Account
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-gray-600 dark:text-gray-400">Already have an account? <a href="login.html" class="text-blue-600 dark:text-blue-400 hover:underline font-medium">Sign in</a></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer will be injected by footer.js -->
    
    <script src="assets/js/theme-toggle.js"></script>
    <script src="assets/js/navbar.js"></script>
    <script src="assets/js/footer.js"></script>
    <script>
        // Password Toggle
        const togglePassword = document.getElementById('toggle-password');
        const password = document.getElementById('password');
        const toggleConfirmPassword = document.getElementById('toggle-confirm-password');
        const confirmPassword = document.getElementById('confirm-password');

        togglePassword.addEventListener('click', () => {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
        });

        toggleConfirmPassword.addEventListener('click', () => {
            const type = confirmPassword.getAttribute('type') === 'password' ? 'text' : 'password';
            confirmPassword.setAttribute('type', type);
        });

        // Password Strength Checker
        const strength1 = document.getElementById('strength-1');
        const strength2 = document.getElementById('strength-2');
        const strength3 = document.getElementById('strength-3');
        const strength4 = document.getElementById('strength-4');
        const strengthText = document.getElementById('strength-text');

        password.addEventListener('input', () => {
            const value = password.value;
            let strength = 0;

            if (value.length >= 8) strength++;
            if (value.match(/[a-z]/) && value.match(/[A-Z]/)) strength++;
            if (value.match(/\d/)) strength++;
            if (value.match(/[^a-zA-Z\d]/)) strength++;

            // Reset colors
            [strength1, strength2, strength3, strength4].forEach(el => {
                el.className = 'h-1 flex-1 bg-gray-200 dark:bg-gray-700 rounded';
            });

            // Update colors based on strength
            const colors = ['bg-red-500', 'bg-orange-500', 'bg-yellow-500', 'bg-green-500'];
            const texts = ['Weak', 'Fair', 'Good', 'Strong'];

            for (let i = 0; i < strength; i++) {
                document.getElementById(`strength-${i + 1}`).className = `h-1 flex-1 ${colors[strength - 1]} rounded`;
            }

            strengthText.textContent = strength > 0 ? texts[strength - 1] : 'Password strength';
            strengthText.className = `text-sm ${strength > 0 ? colors[strength - 1].replace('bg-', 'text-') : 'text-gray-500'}`;
        });

        // Password Match Checker
        const passwordMatch = document.getElementById('password-match');

        confirmPassword.addEventListener('input', () => {
            if (confirmPassword.value === password.value && confirmPassword.value !== '') {
                passwordMatch.textContent = 'Passwords match';
                passwordMatch.className = 'text-sm text-green-500 mt-2';
            } else if (confirmPassword.value !== '') {
                passwordMatch.textContent = 'Passwords do not match';
                passwordMatch.className = 'text-sm text-red-500 mt-2';
            } else {
                passwordMatch.textContent = '';
            }
        });

        // Form Submission
        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            if (password.value !== confirmPassword.value) {
                alert('Passwords do not match!');
                return;
            }

            // Simulate registration
            alert('Account created successfully! Redirecting to login...');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
