<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartFix Pro - Login</title>
    <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
    <meta name="description" content="Login to your SmartFix Pro account. Access your dashboard, track repairs, and manage your appliances.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            blue: '#2563eb',
                            cyan: '#06b6d4',
                            green: '#16a34a',
                            orange: '#f97316',
                            slate: '#0f172a',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <!-- Navbar will be injected by navbar.js -->
    
    <!-- Login Section -->
    <section class="pt-32 pb-20 flex items-center justify-center min-h-screen">
        <div class="max-w-md w-full px-4 sm:px-6 lg:px-8">
            
            <!-- Mode Toggle -->
            <div class="glass-card p-2 mb-8 rounded-xl">
                <div class="flex">
                    <button id="customer-tab" class="flex-1 py-3 px-4 rounded-lg font-semibold transition-all bg-gradient-to-r from-blue-600 to-cyan-500 text-white">
                        Customer Login
                    </button>
                    <button id="admin-tab" class="flex-1 py-3 px-4 rounded-lg font-semibold transition-all text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
                        Admin Login
                    </button>
                </div>
            </div>

            <!-- Customer Login Form -->
            <div id="customer-login" class="glass-card p-8">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 bg-gradient-to-br from-blue-600 to-cyan-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-bold">Welcome Back</h2>
                    <p class="text-gray-600 dark:text-gray-400 mt-2">Sign in to your customer account</p>
                </div>

                <form id="customer-form" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Email Address</label>
                        <div class="relative">
                            <input type="email" id="customer-email" required class="form-input pl-12" placeholder="you@example.com">
                            <svg class="w-5 h-5 text-gray-400 absolute left-4 top-1/2 transform -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"></path>
                            </svg>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Password</label>
                        <div class="relative">
                            <input type="password" id="customer-password" required class="form-input pl-12 pr-12" placeholder="••••••••">
                            <svg class="w-5 h-5 text-gray-400 absolute left-4 top-1/2 transform -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                            <button type="button" id="customer-toggle-password" class="absolute right-4 top-1/2 transform -translate-y-1/2">
                                <svg class="w-5 h-5 text-gray-400 hover:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center justify-between">
                        <label class="flex items-center">
                            <input type="checkbox" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-gray-600 dark:text-gray-400">Remember me</span>
                        </label>
                        <a href="#" class="text-sm text-blue-600 dark:text-blue-400 hover:underline">Forgot password?</a>
                    </div>

                    <button type="submit" class="w-full px-6 py-4 bg-gradient-to-r from-blue-600 to-cyan-500 text-white rounded-xl font-semibold text-lg hover:shadow-2xl hover:scale-105 transition-all duration-300">
                        Sign In
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-gray-600 dark:text-gray-400">Don't have an account? <a href="register.html" class="text-blue-600 dark:text-blue-400 hover:underline font-medium">Sign up</a></p>
                </div>
            </div>

            <!-- Admin Login Form -->
            <div id="admin-login" class="glass-card p-8 hidden">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 bg-gradient-to-br from-orange-500 to-red-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-bold">Admin Portal</h2>
                    <p class="text-gray-600 dark:text-gray-400 mt-2">Sign in to admin dashboard</p>
                </div>

                <form id="admin-form" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Admin Email</label>
                        <div class="relative">
                            <input type="email" id="admin-email" required class="form-input pl-12" placeholder="admin@smartfixpro.com">
                            <svg class="w-5 h-5 text-gray-400 absolute left-4 top-1/2 transform -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"></path>
                            </svg>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Password</label>
                        <div class="relative">
                            <input type="password" id="admin-password" required class="form-input pl-12 pr-12" placeholder="••••••••">
                            <svg class="w-5 h-5 text-gray-400 absolute left-4 top-1/2 transform -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                            <button type="button" id="admin-toggle-password" class="absolute right-4 top-1/2 transform -translate-y-1/2">
                                <svg class="w-5 h-5 text-gray-400 hover:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center justify-between">
                        <label class="flex items-center">
                            <input type="checkbox" class="w-4 h-4 text-orange-500 rounded border-gray-300 focus:ring-orange-500">
                            <span class="ml-2 text-sm text-gray-600 dark:text-gray-400">Remember me</span>
                        </label>
                        <a href="#" class="text-sm text-orange-500 hover:underline">Forgot password?</a>
                    </div>

                    <button type="submit" class="w-full px-6 py-4 bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-xl font-semibold text-lg hover:shadow-2xl hover:scale-105 transition-all duration-300">
                        Admin Sign In
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-gray-600 dark:text-gray-400">Need customer access? <a href="#" id="switch-to-customer" class="text-orange-500 hover:underline font-medium">Switch to Customer Login</a></p>
                </div>
            </div>

        </div>
    </section>

    <!-- Footer will be injected by footer.js -->
    
    <script src="assets/js/theme-toggle.js"></script>
    <script src="assets/js/navbar.js"></script>
    <script src="assets/js/footer.js"></script>
    <script>
        // Tab Switching
        const customerTab = document.getElementById('customer-tab');
        const adminTab = document.getElementById('admin-tab');
        const customerLogin = document.getElementById('customer-login');
        const adminLogin = document.getElementById('admin-login');
        const switchToCustomer = document.getElementById('switch-to-customer');

        customerTab.addEventListener('click', () => {
            customerTab.classList.add('bg-gradient-to-r', 'from-blue-600', 'to-cyan-500', 'text-white');
            customerTab.classList.remove('text-gray-600', 'dark:text-gray-300', 'hover:bg-gray-100', 'dark:hover:bg-gray-700');
            
            adminTab.classList.remove('bg-gradient-to-r', 'from-orange-500', 'to-red-500', 'text-white');
            adminTab.classList.add('text-gray-600', 'dark:text-gray-300', 'hover:bg-gray-100', 'dark:hover:bg-gray-700');
            
            customerLogin.classList.remove('hidden');
            adminLogin.classList.add('hidden');
        });

        adminTab.addEventListener('click', () => {
            adminTab.classList.add('bg-gradient-to-r', 'from-orange-500', 'to-red-500', 'text-white');
            adminTab.classList.remove('text-gray-600', 'dark:text-gray-300', 'hover:bg-gray-100', 'dark:hover:bg-gray-700');
            
            customerTab.classList.remove('bg-gradient-to-r', 'from-blue-600', 'to-cyan-500', 'text-white');
            customerTab.classList.add('text-gray-600', 'dark:text-gray-300', 'hover:bg-gray-100', 'dark:hover:bg-gray-700');
            
            adminLogin.classList.remove('hidden');
            customerLogin.classList.add('hidden');
        });

        if (switchToCustomer) {
            switchToCustomer.addEventListener('click', (e) => {
                e.preventDefault();
                customerTab.click();
            });
        }

        // Password Toggle
        const customerTogglePassword = document.getElementById('customer-toggle-password');
        const customerPassword = document.getElementById('customer-password');
        const adminTogglePassword = document.getElementById('admin-toggle-password');
        const adminPassword = document.getElementById('admin-password');

        customerTogglePassword.addEventListener('click', () => {
            const type = customerPassword.getAttribute('type') === 'password' ? 'text' : 'password';
            customerPassword.setAttribute('type', type);
        });

        adminTogglePassword.addEventListener('click', () => {
            const type = adminPassword.getAttribute('type') === 'password' ? 'text' : 'password';
            adminPassword.setAttribute('type', type);
        });

        // Form Submissions
        document.getElementById('customer-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // Redirect to user dashboard
            window.location.href = 'user-dashboard.html';
        });

        document.getElementById('admin-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // Redirect to admin dashboard
            window.location.href = 'admin-dashboard.html';
        });
    </script>
</body>
</html>
